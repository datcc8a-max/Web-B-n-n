<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - Food Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #FF6B35;
            --secondary-color: #F7931E;
            --dark-color: #2D3436;
            --light-color: #F5F5F5;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            max-width: 900px;
            width: 100%;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .auth-left {
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
        }

        .auth-left h1 {
            font-size: 32px;
            margin-bottom: 20px;
        }

        .auth-left p {
            font-size: 16px;
            line-height: 1.8;
            opacity: 0.9;
            margin-bottom: 30px;
        }

        .auth-left ul {
            list-style: none;
        }

        .auth-left li {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .auth-left i {
            font-size: 20px;
        }

        .auth-right {
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .auth-tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--light-color);
        }

        .tab-btn {
            background: none;
            border: none;
            font-size: 16px;
            font-weight: 600;
            color: #999;
            cursor: pointer;
            padding: 10px 0;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--dark-color);
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 5px rgba(255, 107, 53, 0.2);
        }

        .form-group input::placeholder {
            color: #999;
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .remember-forgot a {
            color: var(--primary-color);
            text-decoration: none;
        }

        .remember-forgot a:hover {
            text-decoration: underline;
        }

        .btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn-login {
            background-color: var(--primary-color);
            color: white;
            margin-bottom: 15px;
        }

        .btn-login:hover {
            background-color: #E55A2B;
            transform: translateY(-2px);
        }

        .btn-login:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
            color: #999;
            font-size: 14px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background-color: #ddd;
        }

        .social-login {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .social-btn {
            padding: 10px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .social-btn:hover {
            border-color: var(--primary-color);
            background-color: var(--light-color);
        }

        .signup-link {
            text-align: center;
            font-size: 14px;
            color: var(--text-color);
        }

        .signup-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }

        .alert.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .alert.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
        }

        @media (max-width: 768px) {
            .auth-container {
                grid-template-columns: 1fr;
            }

            .auth-left {
                padding: 30px;
                display: none;
            }

            .auth-right {
                padding: 30px;
            }

            .auth-left h1 {
                font-size: 24px;
            }

            .auth-left p {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <!-- Left Section -->
        <div class="auth-left">
            <h1>🍔 Food Store</h1>
            <p>Chào mừng đến với cửa hàng bán đồ ăn trực tuyến hàng đầu!</p>
            <ul>
                <li><i class="fas fa-check"></i> Đặt hàng nhanh chóng</li>
                <li><i class="fas fa-check"></i> Giao hàng miễn phí</li>
                <li><i class="fas fa-check"></i> Hỗ trợ 24/7</li>
                <li><i class="fas fa-check"></i> Chất lượng đảm bảo</li>
            </ul>
        </div>

        <!-- Right Section -->
        <div class="auth-right">
            <!-- Tabs -->
            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchTab('login')">Đăng Nhập</button>
                <button class="tab-btn" onclick="switchTab('register')">Đăng Ký</button>
            </div>

            <!-- Alert Message -->
            <div id="alert" class="alert"></div>

            <!-- LOGIN FORM -->
            <form id="loginForm" class="form-section active" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Tên Đăng Nhập</label>
                    <input type="text" id="loginUsername" placeholder="Nhập username" required>
                </div>

                <div class="form-group">
                    <label>Mật Khẩu</label>
                    <input type="password" id="loginPassword" placeholder="Nhập mật khẩu" required>
                </div>

                <div class="remember-forgot">
                    <label>
                        <input type="checkbox"> Nhớ tôi
                    </label>
                    <a href="#">Quên mật khẩu?</a>
                </div>

                <button type="submit" class="btn btn-login">
                    <span id="loginBtnText">Đăng Nhập</span>
                    <div class="loading-spinner" id="loginSpinner"></div>
                </button>

                <div class="divider">Hoặc</div>

                <div class="social-login">
                    <button type="button" class="social-btn">
                        <i class="fab fa-facebook"></i> Facebook
                    </button>
                    <button type="button" class="social-btn">
                        <i class="fab fa-google"></i> Google
                    </button>
                </div>

                <p class="signup-link">Chưa có tài khoản? <a href="#" onclick="switchTab('register'); return false;">Đăng ký ngay</a></p>
            </form>

            <!-- REGISTER FORM -->
            <form id="registerForm" class="form-section" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Tên Đầy Đủ</label>
                    <input type="text" id="registerFullName" placeholder="Nhập tên đầy đủ">
                </div>

                <div class="form-group">
                    <label>Tên Đăng Nhập</label>
                    <input type="text" id="registerUsername" placeholder="Chọn username" required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="registerEmail" placeholder="Nhập email" required>
                </div>

                <div class="form-group">
                    <label>Số Điện Thoại</label>
                    <input type="tel" id="registerPhone" placeholder="Nhập số điện thoại">
                </div>

                <div class="form-group">
                    <label>Mật Khẩu</label>
                    <input type="password" id="registerPassword" placeholder="Nhập mật khẩu" required>
                </div>

                <div class="form-group">
                    <label>Xác Nhận Mật Khẩu</label>
                    <input type="password" id="registerPasswordConfirm" placeholder="Xác nhận mật khẩu" required>
                </div>

                <button type="submit" class="btn btn-login">
                    <span id="registerBtnText">Đăng Ký</span>
                    <div class="loading-spinner" id="registerSpinner"></div>
                </button>

                <p class="signup-link">Đã có tài khoản? <a href="#" onclick="switchTab('login'); return false;">Đăng nhập</a></p>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';

        // Switch between tabs
        function switchTab(tab) {
            document.querySelectorAll('.form-section').forEach(el => {
                el.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(el => {
                el.classList.remove('active');
            });

            if (tab === 'login') {
                document.getElementById('loginForm').classList.add('active');
                document.querySelector('.tab-btn:first-child').classList.add('active');
            } else {
                document.getElementById('registerForm').classList.add('active');
                document.querySelector('.tab-btn:last-child').classList.add('active');
            }

            clearAlert();
        }

        // Show alert
        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = `alert ${type}`;
            setTimeout(() => {
                alert.className = 'alert';
            }, 5000);
        }

        function clearAlert() {
            document.getElementById('alert').className = 'alert';
        }

        // Handle Login
        async function handleLogin(event) {
            event.preventDefault();

            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const spinner = document.getElementById('loginSpinner');
            const btnText = document.getElementById('loginBtnText');

            spinner.style.display = 'inline-block';
            btnText.style.display = 'none';

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    // Save token
                    localStorage.setItem('authToken', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    showAlert('✓ Đăng nhập thành công!', 'success');
                    
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    showAlert('✗ ' + data.message, 'error');
                }
            } catch (error) {
                showAlert('✗ Lỗi: ' + error.message, 'error');
            } finally {
                spinner.style.display = 'none';
                btnText.style.display = 'inline';
            }
        }

        // Handle Register
        async function handleRegister(event) {
            event.preventDefault();

            const username = document.getElementById('registerUsername').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const passwordConfirm = document.getElementById('registerPasswordConfirm').value;
            const full_name = document.getElementById('registerFullName').value;
            const phone = document.getElementById('registerPhone').value;
            const spinner = document.getElementById('registerSpinner');
            const btnText = document.getElementById('registerBtnText');

            // Validation
            if (password !== passwordConfirm) {
                showAlert('✗ Mật khẩu xác nhận không khớp', 'error');
                return;
            }

            if (password.length < 6) {
                showAlert('✗ Mật khẩu phải có ít nhất 6 ký tự', 'error');
                return;
            }

            spinner.style.display = 'inline-block';
            btnText.style.display = 'none';

            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username,
                        email,
                        password,
                        full_name: full_name || null,
                        phone: phone || null
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showAlert('✓ Đăng ký thành công! Vui lòng đăng nhập', 'success');
                    
                    setTimeout(() => {
                        document.getElementById('registerForm').reset();
                        switchTab('login');
                    }, 1500);
                } else {
                    showAlert('✗ ' + data.message, 'error');
                }
            } catch (error) {
                showAlert('✗ Lỗi: ' + error.message, 'error');
            } finally {
                spinner.style.display = 'none';
                btnText.style.display = 'inline';
            }
        }

        // Check if already logged in
        window.addEventListener('load', () => {
            const token = localStorage.getItem('authToken');
            if (token) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
